name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Derive version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR _ <<< "$LATEST_VERSION"
            VERSION_NAME="${MAJOR}.${MINOR}.${{ github.run_number }}"
          fi
          VERSION_CODE=${{ github.run_number }}
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        if: github.ref_type == 'tag'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          KEYSTORE_PATH: ${{ github.ref_type == 'tag' && 'keystore.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CI: 'true'

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: nullify-${{ steps.version.outputs.name }}
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Generate release notes
        id: release_notes
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
            if [[ -n "$PREV_TAG" && "$PREV_TAG" != "$GITHUB_REF_NAME" ]]; then
              git log --oneline "$PREV_TAG..HEAD" > release_notes.md
            fi
          fi
          if [[ ! -f release_notes.md || ! -s release_notes.md ]]; then
            git log --oneline HEAD~10..HEAD > release_notes.md
          fi

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.name }}
          files: androidApp/build/outputs/apk/release/*.apk
          body_path: release_notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false
          make_latest: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run lint
        run: ./gradlew lint
