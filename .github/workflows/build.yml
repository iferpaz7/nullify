name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Strip 'v' prefix: v1.2.3 -> 1.2.3
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="1.0.${{ github.run_number }}-${GITHUB_REF_NAME:-main}"
          fi
          VERSION_CODE=${{ github.run_number }}
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        if: github.ref_type == 'tag'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          KEYSTORE_PATH: ${{ github.ref_type == 'tag' && 'keystore.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CI: 'true'

      - name: Upload debug APK
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: nullify-${{ steps.version.outputs.name }}
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: nullify-${{ steps.version.outputs.name }}
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Generate release notes
        if: github.ref_type == 'tag'
        id: release_notes
        run: |
          git log --oneline "$(git tag --sort=-creatordate | head -2 | tail -1)..HEAD" 2>/dev/null \
            || git log --oneline HEAD~10..HEAD \
            > release_notes.md

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: androidApp/build/outputs/apk/release/*.apk
          body_path: release_notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run lint
        run: ./gradlew lint
