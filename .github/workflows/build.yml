name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/wiki-sync.yml'
      - 'mkdocs.yml'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/wiki-sync.yml'
      - 'mkdocs.yml'
      - 'README.md'
      - 'LICENSE'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
        with:
          api-level: 36

      - name: Build Android
        run: ./gradlew :androidApp:assembleDebug
